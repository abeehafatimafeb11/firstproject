<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paint — Abeeha Fatima</title>
  <script>
    (function () {
      var k = "abeeha-theme";
      var t = null;
      try {
        t = localStorage.getItem(k);
      } catch (e) {}
      if (t !== "light" && t !== "dark") {
        t = "dark";
      }
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="clocks.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      row-gap: 0.65rem;
      padding: 0.65rem clamp(1rem, 4vw, 3rem);
      background: var(--nav-bg);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      list-style: none;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
      background: var(--nav-link-hover-bg);
    }

    .nav-links a.primary {
      color: var(--primary-pill-fg);
      background: linear-gradient(135deg, var(--accent), #818cf8);
      box-shadow: 0 4px 20px var(--accent-soft);
      pointer-events: none;
    }

    .paint-page {
      padding: clamp(1.25rem, 4vw, 2rem);
      min-height: calc(100vh - var(--nav-h));
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-elevated) 40%, var(--bg) 100%);
    }

    .paint-inner {
      max-width: 960px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1rem;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .toolbar label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .toolbar input[type="color"] {
      width: 2.5rem;
      height: 2rem;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
    }

    .toolbar input[type="range"] {
      width: 120px;
      accent-color: var(--accent);
    }

    .toolbar button {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: var(--key-muted);
      color: var(--text);
      transition: background 0.15s;
    }

    .toolbar button:hover {
      background: var(--key-muted-hover);
    }

    .toolbar button.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .toolbar button.danger {
      color: #f87171;
    }

    .canvas-wrap {
      border-radius: calc(var(--radius) + 4px);
      overflow: hidden;
      border: 2px solid var(--paint-frame-border);
      box-shadow:
        0 0 0 1px var(--paint-frame-outline),
        var(--frame-outer-shadow),
        inset 0 1px 0 var(--inset-highlight);
      background: var(--frame-bg);
      touch-action: none;
    }

    #draw-canvas {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: middle;
      cursor: crosshair;
    }

    @media (max-width: 768px) {
      .nav > nav {
        flex: 1 1 100%;
      }

      .nav-links {
        justify-content: flex-start;
      }

      .logo {
        font-size: 1.1rem;
      }

      .nav-links a {
        font-size: 0.85rem;
        padding: 0.45rem 0.75rem;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar label {
        flex-wrap: wrap;
      }

      .toolbar input[type="range"] {
        width: 100%;
        max-width: 280px;
      }
    }

    @media (max-width: 400px) {
      .nav-links a {
        font-size: 0.78rem;
        padding: 0.4rem 0.6rem;
      }

      .paint-page {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <header class="nav">
    <a class="logo" href="index.html">Abeeha <span>Fatima</span></a>
    <nav aria-label="Main">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="calculate.html">Calculator</a></li>
        <li><a class="primary" href="paint.html" aria-current="page">Paint</a></li>
        <li><a href="about.html">About Me</a></li>
      </ul>
      <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle light or dark theme" title="Theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M17.657 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
      </button>
    </nav>
  </header>

  <main class="paint-page">
    <div class="paint-inner">
      <p class="section-label">Paint</p>
      <div class="toolbar" aria-label="Drawing tools">
        <label>
          Color
          <input type="color" id="brush-color" value="#38bdf8" />
        </label>
        <label>
          Size <span id="size-label">4</span>px
          <input type="range" id="brush-size" min="1" max="48" value="4" />
        </label>
        <button type="button" id="tool-brush" class="active">Brush</button>
        <button type="button" id="tool-eraser">Eraser</button>
        <button type="button" id="clear-canvas" class="danger">Clear</button>
      </div>
      <div class="canvas-wrap">
        <canvas id="draw-canvas" width="920" height="520" aria-label="Drawing area"></canvas>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const canvas = document.getElementById("draw-canvas");
      const ctx = canvas.getContext("2d");
      const colorInput = document.getElementById("brush-color");
      const sizeInput = document.getElementById("brush-size");
      const sizeLabel = document.getElementById("size-label");
      const btnBrush = document.getElementById("tool-brush");
      const btnEraser = document.getElementById("tool-eraser");
      const btnClear = document.getElementById("clear-canvas");

      let drawing = false;
      let mode = "brush";

      function syncCanvasSize() {
        const wrap = canvas.parentElement;
        const w = Math.min(920, wrap.clientWidth);
        const scale = w / canvas.width;
        canvas.style.width = w + "px";
        canvas.style.height = canvas.height * scale + "px";
      }

      function canvasCoords(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
        };
      }

      function applyStrokeStyle() {
        const size = parseInt(sizeInput.value, 10);
        ctx.lineWidth = size;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        if (mode === "eraser") {
          ctx.strokeStyle = "#121820";
          ctx.globalCompositeOperation = "source-over";
        } else {
          ctx.strokeStyle = colorInput.value;
          ctx.globalCompositeOperation = "source-over";
        }
      }

      function startStroke(e) {
        drawing = true;
        applyStrokeStyle();
        const p = "touches" in e ? e.touches[0] : e;
        const { x, y } = canvasCoords(p.clientX, p.clientY);
        ctx.beginPath();
        ctx.moveTo(x, y);
      }

      function moveStroke(e) {
        if (!drawing) return;
        if ("touches" in e) e.preventDefault();
        const p = "touches" in e ? e.touches[0] : e;
        const { x, y } = canvasCoords(p.clientX, p.clientY);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      }

      function endStroke() {
        drawing = false;
        ctx.closePath();
      }

      function clearBoard() {
        ctx.fillStyle = "#121820";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      colorInput.addEventListener("input", function () {
        if (mode === "brush") applyStrokeStyle();
      });

      sizeInput.addEventListener("input", function () {
        sizeLabel.textContent = sizeInput.value;
      });

      btnBrush.addEventListener("click", function () {
        mode = "brush";
        btnBrush.classList.add("active");
        btnEraser.classList.remove("active");
      });

      btnEraser.addEventListener("click", function () {
        mode = "eraser";
        btnEraser.classList.add("active");
        btnBrush.classList.remove("active");
      });

      btnClear.addEventListener("click", clearBoard);

      canvas.addEventListener("mousedown", startStroke);
      canvas.addEventListener("mousemove", moveStroke);
      window.addEventListener("mouseup", endStroke);

      canvas.addEventListener("touchstart", startStroke, { passive: false });
      canvas.addEventListener("touchmove", moveStroke, { passive: false });
      canvas.addEventListener("touchend", endStroke);
      canvas.addEventListener("touchcancel", endStroke);

      window.addEventListener("resize", syncCanvasSize);
      clearBoard();
      syncCanvasSize();
    })();
  </script>
  <script src="theme.js"></script>
  <script src="clocks.js"></script>
</body>
</html>

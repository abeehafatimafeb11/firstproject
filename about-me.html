<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abeeha Fatima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --text: #e8eef4;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.15);
      --border: rgba(148, 163, 184, 0.12);
      --radius: 14px;
      --nav-h: 72px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.25rem, 4vw, 3rem);
      background: rgba(15, 20, 25, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    .nav-links a.primary {
      color: var(--bg);
      background: linear-gradient(135deg, var(--accent), #818cf8);
      box-shadow: 0 4px 20px var(--accent-soft);
      pointer-events: none;
    }

    .page-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 4vw, 2rem);
    }

    .frame {
      width: 100%;
      max-width: min(720px, 100%);
      aspect-ratio: 1024 / 682;
      border-radius: calc(var(--radius) + 6px);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      background: #121820;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <header class="nav">
    <a class="logo" href="about-me.html">Alex<span>.</span>Studio</a>
    <nav aria-label="Main">
      <ul class="nav-links">
        <li><a class="primary" href="about-me.html" aria-current="page">Home</a></li>
        <li><a href="about.html">About Me</a></li>
      </ul>
    </nav>
  </header>

  <div class="page-center">
    <main class="frame" role="main">
      <img
        src="abeeha-hero.png"
        alt="Illustration of Abeeha coding at a desk with monitors"
        width="1024"
        height="682"
        loading="eager"
      />
    </main>
  </div>
</body>
</html>

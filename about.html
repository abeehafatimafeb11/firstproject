<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me — Abeeha Fatima</title>
  <script>
    (function () {
      var k = "abeeha-theme";
      var t = null;
      try {
        t = localStorage.getItem(k);
      } catch (e) {}
      if (t !== "light" && t !== "dark") {
        t = "dark";
      }
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="stylesheet" href="theme.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      row-gap: 0.65rem;
      padding: 0.65rem clamp(1rem, 4vw, 3rem);
      background: var(--nav-bg);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.35rem 0.5rem;
      list-style: none;
      justify-content: flex-end;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
      background: var(--nav-link-hover-bg);
    }

    .nav-links a.primary {
      color: var(--primary-pill-fg);
      background: linear-gradient(135deg, var(--accent), #818cf8);
      box-shadow: 0 4px 20px var(--accent-soft);
      pointer-events: none;
    }

    .about {
      padding: clamp(3rem, 8vw, 6rem) clamp(1.25rem, 4vw, 3rem);
      background:
        linear-gradient(180deg, var(--bg) 0%, var(--bg-elevated) 50%, var(--bg) 100%);
      min-height: calc(100vh - var(--nav-h) - 80px);
    }

    .about-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .about h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.75rem, 3.5vw, 2.25rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }

    .about p {
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-size: 1.05rem;
    }

    .about p:last-of-type {
      margin-bottom: 0;
    }

    footer {
      text-align: center;
      padding: 2rem 1.25rem 2.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      .nav > nav {
        flex: 1 1 100%;
      }

      .nav-links {
        justify-content: flex-start;
      }

      .logo {
        font-size: 1.1rem;
      }

      .nav-links a {
        font-size: 0.85rem;
        padding: 0.45rem 0.75rem;
      }

      .about p {
        font-size: 1rem;
      }

      footer {
        font-size: 0.8rem;
        padding: 1.5rem 1rem 2rem;
      }
    }

    @media (max-width: 400px) {
      .nav-links a {
        font-size: 0.78rem;
        padding: 0.4rem 0.6rem;
      }
    }
  </style>
</head>
<body>
  <header class="nav">
    <a class="logo" href="index.html">Abeeha <span>Fatima</span></a>
    <nav aria-label="Main">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="calculate.html">Calculator</a></li>
        <li><a href="paint.html">Paint</a></li>
        <li><a class="primary" href="about.html" aria-current="page">About Me</a></li>
      </ul>
      <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle light or dark theme" title="Theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M17.657 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
      </button>
    </nav>
  </header>

  <main>
    <section class="about" aria-labelledby="about-title">
      <div class="about-inner">
        <p class="section-label">About Me</p>
        <h1 id="about-title">About Me</h1>
        <p>My name is Abeeha.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 — Built as a simple static page. Swap the image URL and copy to make it yours.</p>
  </footer>
  <script src="theme.js"></script>
</body>
</html>

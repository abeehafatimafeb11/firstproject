<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me — Abeeha Fatima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --bg-elevated: #1a222c;
      --text: #e8eef4;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.15);
      --border: rgba(148, 163, 184, 0.12);
      --radius: 14px;
      --nav-h: 72px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.25rem, 4vw, 3rem);
      background: rgba(15, 20, 25, 0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    .nav-links a.primary {
      color: var(--bg);
      background: linear-gradient(135deg, var(--accent), #818cf8);
      box-shadow: 0 4px 20px var(--accent-soft);
      pointer-events: none;
    }

    .about {
      padding: clamp(3rem, 8vw, 6rem) clamp(1.25rem, 4vw, 3rem);
      background:
        linear-gradient(180deg, var(--bg) 0%, var(--bg-elevated) 50%, var(--bg) 100%);
      min-height: calc(100vh - var(--nav-h) - 80px);
    }

    .about-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .about h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.75rem, 3.5vw, 2.25rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }

    .about p {
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-size: 1.05rem;
    }

    .about p:last-of-type {
      margin-bottom: 0;
    }

    footer {
      text-align: center;
      padding: 2rem 1.25rem 2.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header class="nav">
    <a class="logo" href="about-me.html">Alex<span>.</span>Studio</a>
    <nav aria-label="Main">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a class="primary" href="about.html" aria-current="page">About Me</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="about" aria-labelledby="about-title">
      <div class="about-inner">
        <p class="section-label">About Me</p>
        <h1 id="about-title">About Me</h1>
        <p>My name is Abeeha.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 — Built as a simple static page. Swap the image URL and copy to make it yours.</p>
  </footer>
</body>
</html>

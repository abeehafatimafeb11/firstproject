<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator — Abeeha Fatima</title>
  <script>
    (function () {
      var k = "abeeha-theme";
      var t = null;
      try {
        t = localStorage.getItem(k);
      } catch (e) {}
      if (t !== "light" && t !== "dark") {
        t = "dark";
      }
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="stylesheet" href="theme.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      row-gap: 0.65rem;
      padding: 0.65rem clamp(1rem, 4vw, 3rem);
      background: var(--nav-bg);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.35rem 0.5rem;
      list-style: none;
      justify-content: flex-end;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
      background: var(--nav-link-hover-bg);
    }

    .nav-links a.primary {
      color: var(--primary-pill-fg);
      background: linear-gradient(135deg, var(--accent), #818cf8);
      box-shadow: 0 4px 20px var(--accent-soft);
      pointer-events: none;
    }

    .calc-page {
      padding: clamp(2rem, 6vw, 4rem) clamp(1.25rem, 4vw, 3rem);
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(180deg, var(--bg) 0%, var(--bg-elevated) 45%, var(--bg) 100%);
    }

    .calc-wrap {
      width: 100%;
      max-width: 320px;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      text-align: center;
    }

    .calc {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      padding: 1rem;
      box-shadow:
        var(--shadow-strong),
        inset 0 1px 0 var(--inset-highlight);
    }

    .calc-display {
      font-family: "DM Sans", monospace;
      font-size: 1.75rem;
      font-weight: 600;
      text-align: right;
      padding: 1rem 1rem 0.75rem;
      margin-bottom: 0.75rem;
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      color: var(--text);
      min-height: 3.25rem;
      word-break: break-all;
    }

    .calc-keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }

    .calc-keys button {
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 0.5rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      background: var(--key-bg);
      color: var(--text);
      transition: background 0.15s, transform 0.1s;
    }

    .calc-keys button:active {
      transform: scale(0.97);
    }

    .calc-keys button:hover {
      background: var(--key-hover);
    }

    .calc-keys button.op {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .calc-keys button.op:hover {
      background: var(--key-op-hover);
    }

    .calc-keys button.wide {
      grid-column: span 2;
    }

    .calc-keys button.accent-btn {
      background: linear-gradient(135deg, var(--accent), #818cf8);
      color: var(--primary-pill-fg);
    }

    .calc-keys button.accent-btn:hover {
      filter: brightness(1.08);
    }

    @media (max-width: 768px) {
      .nav > nav {
        flex: 1 1 100%;
      }

      .nav-links {
        justify-content: flex-start;
      }

      .logo {
        font-size: 1.1rem;
      }

      .nav-links a {
        font-size: 0.85rem;
        padding: 0.45rem 0.75rem;
      }

      .calc-page {
        padding: 1.25rem clamp(1rem, 4vw, 2rem);
      }

      .calc-wrap {
        max-width: none;
      }
    }

    @media (max-width: 400px) {
      .nav-links a {
        font-size: 0.78rem;
        padding: 0.4rem 0.6rem;
      }

      .calc-display {
        font-size: clamp(1.25rem, 6vw, 1.65rem);
        padding: 0.75rem 0.85rem;
      }

      .calc-keys {
        gap: 0.4rem;
      }

      .calc-keys button {
        padding: 0.85rem 0.35rem;
        font-size: 1rem;
      }

      .calc {
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <header class="nav">
    <a class="logo" href="index.html">Abeeha <span>Fatima</span></a>
    <nav aria-label="Main">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a class="primary" href="calculate.html" aria-current="page">Calculator</a></li>
        <li><a href="paint.html">Paint</a></li>
        <li><a href="about.html">About Me</a></li>
      </ul>
      <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle light or dark theme" title="Theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M17.657 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
      </button>
    </nav>
  </header>

  <main class="calc-page">
    <div class="calc-wrap">
      <p class="section-label">Calculator</p>
      <div class="calc" aria-label="Calculator">
        <div class="calc-display" id="display" role="status" aria-live="polite">0</div>
        <div class="calc-keys">
          <button type="button" data-action="clear">C</button>
          <button type="button" data-action="sign">±</button>
          <button type="button" data-action="percent">%</button>
          <button type="button" class="op" data-action="operator" data-value="/">÷</button>
          <button type="button" data-action="digit" data-value="7">7</button>
          <button type="button" data-action="digit" data-value="8">8</button>
          <button type="button" data-action="digit" data-value="9">9</button>
          <button type="button" class="op" data-action="operator" data-value="*">×</button>
          <button type="button" data-action="digit" data-value="4">4</button>
          <button type="button" data-action="digit" data-value="5">5</button>
          <button type="button" data-action="digit" data-value="6">6</button>
          <button type="button" class="op" data-action="operator" data-value="-">−</button>
          <button type="button" data-action="digit" data-value="1">1</button>
          <button type="button" data-action="digit" data-value="2">2</button>
          <button type="button" data-action="digit" data-value="3">3</button>
          <button type="button" class="op" data-action="operator" data-value="+">+</button>
          <button type="button" class="wide" data-action="digit" data-value="0">0</button>
          <button type="button" data-action="decimal">.</button>
          <button type="button" class="accent-btn" data-action="equals">=</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const display = document.getElementById("display");
      let current = "0";
      let stored = null;
      let pendingOp = null;
      let fresh = true;

      function updateDisplay() {
        display.textContent = current;
      }

      function parseCurrent() {
        return parseFloat(current) || 0;
      }

      function applyOp(a, b, op) {
        switch (op) {
          case "+":
            return a + b;
          case "-":
            return a - b;
          case "*":
            return a * b;
          case "/":
            return b === 0 ? NaN : a / b;
          default:
            return b;
        }
      }

      function formatResult(n) {
        if (!Number.isFinite(n)) return "Error";
        const s = String(n);
        if (s.length > 12) return n.toPrecision(8).replace(/\.?0+e/, "e");
        return s.replace(/\.0+$|(\.\d*?)0+$/, "$1").replace(/\.$/, "");
      }

      function inputDigit(d) {
        if (fresh) {
          current = d;
          fresh = false;
        } else {
          if (current === "0" && d !== "0") current = d;
          else if (current === "0" && d === "0") return;
          else if (current.replace("-", "").length < 12) current += d;
        }
        updateDisplay();
      }

      function inputDecimal() {
        if (fresh) {
          current = "0.";
          fresh = false;
        } else if (!current.includes(".")) {
          current += ".";
        }
        updateDisplay();
      }

      function commitOp(nextOp) {
        const val = parseCurrent();
        if (stored === null || pendingOp === null) {
          stored = val;
        } else {
          const res = applyOp(stored, val, pendingOp);
          if (!Number.isFinite(res)) {
            current = "Error";
            stored = null;
            pendingOp = null;
            fresh = true;
            updateDisplay();
            return;
          }
          stored = res;
          current = formatResult(stored);
          updateDisplay();
        }
        pendingOp = nextOp;
        fresh = true;
      }

      function equals() {
        if (pendingOp === null) return;
        const val = parseCurrent();
        const res = applyOp(stored, val, pendingOp);
        if (!Number.isFinite(res)) {
          current = "Error";
          stored = null;
          pendingOp = null;
          fresh = true;
          updateDisplay();
          return;
        }
        stored = null;
        pendingOp = null;
        current = formatResult(res);
        fresh = true;
        updateDisplay();
      }

      function clearAll() {
        current = "0";
        stored = null;
        pendingOp = null;
        fresh = true;
        updateDisplay();
      }

      function toggleSign() {
        if (current === "0" || current === "Error") return;
        if (current.startsWith("-")) current = current.slice(1);
        else current = "-" + current;
        updateDisplay();
      }

      function percent() {
        if (current === "Error") return;
        const n = parseCurrent() / 100;
        current = formatResult(n);
        fresh = true;
        updateDisplay();
      }

      document.querySelector(".calc-keys").addEventListener("click", function (e) {
        const btn = e.target.closest("button");
        if (!btn) return;
        const action = btn.dataset.action;
        if (current === "Error" && action !== "clear") return;

        switch (action) {
          case "digit":
            inputDigit(btn.dataset.value);
            break;
          case "decimal":
            inputDecimal();
            break;
          case "operator":
            commitOp(btn.dataset.value);
            break;
          case "equals":
            equals();
            break;
          case "clear":
            clearAll();
            break;
          case "sign":
            toggleSign();
            break;
          case "percent":
            percent();
            break;
        }
      });
    })();
  </script>
  <script src="theme.js"></script>
</body>
</html>
